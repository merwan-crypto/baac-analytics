name: Pipeline CI/CD

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main, ma-branche ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Vérifier le dépôt
      uses: actions/checkout@v4

    - name: Configurer Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Installer les dépendances
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pylint

    - name: Initialiser la base de données utilisateurs
      run: python setup.py

    - name: Exécuter les tests unitaires (Database + Session)
      run: pytest tests/test_database.py -v

    - name: Exécuter les tests smoke dashboard (si DuckDB disponible)
      run: |
        if [ -f data/accidents.duckdb ]; then
          pytest tests/test_dashboard_smoke.py -v
        else
          echo "Fichier DuckDB absent (normal en CI sans données) — tests smoke ignorés."
        fi

    - name: Vérifier la qualité du code avec PyLint
      run: pylint --exit-zero src/ main.py utils.py

    - name: Build de l'image Docker (si Dockerfile présent)
      run: |
        if [ -f Dockerfile ]; then
          echo "Dockerfile trouvé, lancement du build..."
          docker build -t myimage .
        else
          echo "Aucun Dockerfile trouvé — étape ignorée."
        fi