name: Pipeline CI/CD

on:
  push:
    # Déclenche sur chaque push (peut être restreint à certaines branches si nécessaire)
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Vérifier le dépôt
      uses: actions/checkout@v2

    - name: Configurer Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'

    - name: Installer les dépendances
      run: |
        python -m pip install --upgrade pip
        pip install pylint

    - name: Initialiser la base de données
      run: python setup.py

    - name: Exécuter le test unitaire
      run: python tests/test_database.py

    - name: Vérifier la qualité du code avec PyLint
      run: pylint --exit-zero *.py

    - name: Build de l'image Docker (si Dockerfile présent)
      run: |
        if [ -f Dockerfile ]; then
          echo "Dockerfile trouvé, lancement du build..."
          docker build -t myimage .
        else
          echo "Aucun Dockerfile trouvé, étape de build Docker ignorée."
        fi
